function setLang(code){lang=code;localStorage.setItem('uc_lang',code);const l=LANGS.find(x=>x.code===code);document.documentElement.dir=l?.rtl?'rtl':'ltr';document.documentElement.lang=code;buildBar();render();}
function render(){
  const d=C[lang]||C.de;
  document.getElementById('bc').innerHTML=`<a href="/blog.html">${d.breadcrumb}</a> ▸ ${d.title}`;
  document.getElementById('ttl').textContent=d.title;
  document.getElementById('cv').textContent=d.cv;
  document.getElementById('cv-sub').textContent=d.cv_sub;
  document.getElementById('atags').innerHTML=TAGS.map(t=>`<span class="tag">${t}</span>`).join('');
  const fLabels=[['de','Rechner','en','Converter','fr','Convertisseur','es','Conversor','it','Convertitore','pt','Conversor','nl','Omzetter','pl','Przelicznik','tr','Dönüştürücü','ar','المحوّل','zh','转换器'],['de','Wissenswertes','en','Knowledge','fr','Connaissances','es','Conocimiento','it','Conoscenza','pt','Conhecimento','nl','Kennis','pl','Wiedza','tr','Bilgi','ar','المعرفة','zh','知识'],['de','FAQ','en','FAQ','fr','FAQ','es','FAQ','it','FAQ','pt','FAQ','nl','FAQ','pl','FAQ','tr','SSS','ar','الأسئلة','zh','常见问题'],['de','Impressum','en','Imprint','fr','Mentions légales','es','Aviso legal','it','Note legali','pt','Aviso','nl','Colofon','pl','Nota','tr','Künye','ar','قانوني','zh','声明'],['de','Datenschutz','en','Privacy','fr','Confidentialité','es','Privacidad','it','Privacy','pt','Privacidade','nl','Privacy','pl','Prywatność','tr','Gizlilik','ar','الخصوصية','zh','隐私']];
  fLabels.forEach((arr,i)=>{const m={};for(let j=0;j<arr.length;j+=2)m[arr[j]]=arr[j+1];const el=document.getElementById('f'+(i+1));if(el)el.textContent=(i===0?'⇢ ':'')+( m[lang]||m.en);});
  document.getElementById('secs').innerHTML=d.sections.map(s=>`<div class="section"><div class="section-head"><span class="section-icon">${s.icon}</span><span class="section-title">${s.title}</span></div><div class="section-body">${s.body}</div></div>`).join('');
  if(ROWS.length&&d.th.length){
    document.getElementById('tbl').innerHTML=`<div class="section"><div class="section-head"><span class="section-icon">📊</span><span class="section-title">${d.tc||'Tabelle'}</span></div><div class="section-body" style="padding:0;overflow-x:auto"><table class="data-table"><thead><tr>${d.th.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${ROWS.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
  }
  document.getElementById('qt').textContent=d.qt;
  let score=0,ans=0;
  document.getElementById('qb').innerHTML=d.quiz.map((q,i)=>`<div id="qq${i}"><div class="quiz-q">${i+1}. ${q.q}</div><div class="quiz-options">${q.options.map((o,j)=>`<div class="quiz-option" data-qi="${i}" data-oi="${j}">${String.fromCharCode(65+j)}. ${o}</div>`).join('')}</div><div class="quiz-feedback" id="qf${i}"></div></div>`).join('')+`<div style="text-align:center;margin-top:8px"><div class="quiz-score" id="qs" data-tpl="${d.score_tpl}"></div><button class="quiz-reset" id="qr">${d.reset}</button></div>`;
  document.querySelectorAll('.quiz-option').forEach(opt=>{
    opt.addEventListener('click',()=>{
      const qi=+opt.dataset.qi,oi=+opt.dataset.oi,q=d.quiz[qi];
      if(document.querySelector(`[data-qi="${qi}"].disabled`))return;
      document.querySelectorAll(`[data-qi="${qi}"]`).forEach(o=>o.classList.add('disabled'));
      const ok=oi===q.correct;
      opt.classList.add(ok?'correct':'wrong');
      if(!ok)document.querySelector(`[data-qi="${qi}"][data-oi="${q.correct}"]`).classList.add('correct');
      const fb=document.getElementById('qf'+qi);
      fb.textContent=ok?q.fc:q.fw;
      fb.className='quiz-feedback show '+(ok?'correct':'wrong');
      if(ok)score++;
      ans++;
      if(ans===d.quiz.length){
        const qs=document.getElementById('qs');
        qs.textContent=qs.dataset.tpl.replace('{score}',score).replace('{total}',d.quiz.length);
        qs.classList.add('show');
        document.getElementById('qr').classList.add('show');
      }
    });
  });
  document.getElementById('qr').addEventListener('click',()=>{score=0;ans=0;document.querySelectorAll('.quiz-option').forEach(o=>o.className='quiz-option');document.querySelectorAll('.quiz-feedback').forEach(f=>f.className='quiz-feedback');document.getElementById('qs').classList.remove('show');document.getElementById('qr').classList.remove('show');});
  document.getElementById('stitle').textContent=d.src;
  document.getElementById('sbody').innerHTML=SRCS.map(s=>`<div class="source-box"><strong>${s.a} (${s.y}).</strong> ${s.t}. <a href="${s.u}" target="_blank" rel="noopener">${s.p}</a>.</div>`).join('');
}
buildBar();render();
</script>
</body>
</html>
