let currentLang = localStorage.getItem('uc_lang') || 'de';

function buildLangBar(){
  const bar=document.getElementById('lang-bar');
  bar.innerHTML=LANGS.map(l=>`<button class="lang-btn${l.code===currentLang?' active':''}" data-lang="${l.code}" title="${l.name}"><span>${l.flag}</span><span>${l.code.toUpperCase()}</span></button>`).join('');
  bar.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
}

function setLang(code){
  currentLang=code;
  localStorage.setItem('uc_lang',code);
  const lang=LANGS.find(l=>l.code===code);
  document.documentElement.dir=lang?.rtl?'rtl':'ltr';
  document.documentElement.lang=code;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===code));
  render();
}

function render(){
  const d=HELP[currentLang]||HELP['de'];
  document.getElementById('page-title').textContent=d.title;
  document.getElementById('page-meta').textContent=d.meta+' · Universal-Converter';
  document.getElementById('footer-converter').textContent=d.footer_converter;
  document.getElementById('footer-faq').textContent=d.footer_faq;
  document.getElementById('footer-help').textContent=d.footer_help;
  document.getElementById('footer-impressum').textContent=d.footer_impressum;
  document.getElementById('footer-datenschutz').textContent=d.footer_datenschutz;
  document.getElementById('footer-copy').textContent=d.footer_copy;

  // Cards
  document.getElementById('help-cards').innerHTML=d.cards.map(c=>`
    <div class="help-card">
      <div class="help-card-icon">${c.icon}</div>
      <div class="help-card-title">${c.title}</div>
      <div class="help-card-text">${c.text}</div>
    </div>`).join('');

  // Sections
  document.getElementById('help-sections').innerHTML=d.sections.map(s=>`
    <div class="help-section">
      <div class="help-section-head"><span class="help-section-icon">${s.icon}</span><span class="help-section-title">${s.title}</span></div>
      <div class="help-section-body">
        ${s.steps.map(step=>`
          <div class="help-step">
            <div class="help-step-num">${step.num}</div>
            <div class="help-step-content">
              <div class="help-step-title">${step.title}</div>
              <div class="help-step-text">${step.text}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

buildLangBar();
render();
