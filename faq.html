.faq-item::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--blue-dim),transparent);}
.faq-q{

.faq-toggle{color:var(--text-secondary);font-size:1rem;flex-shrink:0;transition:transform 0.2s;}
.faq-item.open .faq-toggle{transform:rotate(45deg);color:var(--blue-bright);}

.no-results{text-align:center;padding:40px;color:var(--text-secondary);font-size:0.85rem;}

let currentLang = localStorage.getItem('uc_lang') || 'de';
let activeGroup = 'all';

function buildLangBar() {
  const bar = document.getElementById('lang-bar');
  bar.innerHTML = LANGS.map(l =>
    `<button class="lang-btn${l.code===currentLang?' active':''}" data-lang="${l.code}" title="${l.name}">
      <span>${l.flag}</span><span>${l.code.toUpperCase()}</span>
    </button>`
  ).join('');
  bar.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));
}

function setLang(code) {
  currentLang = code;
  localStorage.setItem('uc_lang', code);
  const lang = LANGS.find(l=>l.code===code);
  document.documentElement.dir = lang?.rtl ? 'rtl' : 'ltr';
  document.documentElement.lang = code;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang===code));
  activeGroup = 'all';
  render();
}

function render() {
  const d = FAQ_DATA[currentLang] || FAQ_DATA['de'];
  document.getElementById('page-title').textContent = d.title;
  document.getElementById('page-meta').textContent = d.meta + ' · Universal-Converter';
  document.getElementById('faq-search').placeholder = d.search_placeholder;
  document.getElementById('fl-converter').textContent = d.footer_converter;
  document.getElementById('fl-faq').textContent = d.footer_faq;
  document.getElementById('fl-help').textContent = d.footer_help;
  document.getElementById('fl-imp').textContent = d.footer_impressum;
  document.getElementById('fl-dsgvo').textContent = d.footer_datenschutz;
  document.getElementById('footer-copy').textContent = d.footer_copy;

  // Category buttons
  const cats = document.getElementById('faq-cats');
  cats.innerHTML = `<button class="faq-cat-btn${activeGroup==='all'?' active':''}" data-group="all">${d.all}</button>` +
    d.groups.map(g => `<button class="faq-cat-btn${activeGroup===g.id?' active':''}" data-group="${g.id}">${g.label}</button>`).join('');
  cats.querySelectorAll('.faq-cat-btn').forEach(b => b.addEventListener('click', () => {
    activeGroup = b.dataset.group;
    render();
  }));

  renderFAQ(d, '');
}

function renderFAQ(d, query) {
  const q = query.toLowerCase().trim();
  const content = document.getElementById('faq-content');
  let html = '';
  let total = 0;
  d.groups.forEach(group => {
    if(activeGroup !== 'all' && activeGroup !== group.id) return;
    const items = group.items.filter(item =>
      !q || item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q)
    );
    if(!items.length) return;
    total += items.length;
    html += `<div class="faq-group"><div class="faq-group-title">${group.label}</div>`;
    items.forEach((item, i) => {
      const qhl = q ? item.q.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark style="background:rgba(0,200,255,0.2);color:var(--blue-bright);border-radius:2px">$1</mark>') : item.q;
      const ahl = q ? item.a.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark style="background:rgba(0,200,255,0.2);color:var(--blue-bright);border-radius:2px">$1</mark>') : item.a;
      html += `<div class="faq-item" id="faq-${group.id}-${i}">
        <div class="faq-q" onclick="toggleFAQ('faq-${group.id}-${i}')">
          <span>${qhl}</span><span class="faq-toggle">+</span>
        </div>
        <div class="faq-a">${ahl}</div>
      </div>`;
    });
    html += '</div>';
  });
  content.innerHTML = total ? html : `<div class="no-results">Keine Ergebnisse gefunden.</div>`;
}

window.toggleFAQ = function(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
};

document.getElementById('faq-search').addEventListener('input', function() {
  const d = FAQ_DATA[currentLang] || FAQ_DATA['de'];
  renderFAQ(d, this.value);
});

buildLangBar();
render();
</script>
