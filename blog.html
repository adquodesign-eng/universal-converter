let currentLang=localStorage.getItem('uc_lang')||'de';
let activeGroup='all';
function buildLangBar(){const bar=document.getElementById('lang-bar');bar.innerHTML=LANGS.map(l=>`<button class="lang-btn${l.code===currentLang?' active':''}" data-lang="${l.code}" title="${l.name}"><span>${l.flag}</span><span>${l.code.toUpperCase()}</span></button>`).join('');bar.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));}
function setLang(code){currentLang=code;localStorage.setItem('uc_lang',code);const lang=LANGS.find(l=>l.code===code);document.documentElement.dir=lang?.rtl?'rtl':'ltr';document.documentElement.lang=code;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===code));render();}
function render(){const ui=UI[currentLang]||UI['de'];document.getElementById('page-title').textContent=ui.title;document.getElementById('page-meta').textContent=ui.meta+' · Universal-Converter';document.getElementById('blog-search').placeholder=ui.search;['converter','blog','faq','help','imp','dsgvo','copy'].forEach(k=>{const el=document.getElementById('fl-'+k);if(el)el.textContent=ui['fl_'+k];});const groups=['all',...new Set(ARTICLES.map(a=>a.group))];const tabs=document.getElementById('filter-tabs');tabs.innerHTML=groups.map(g=>`<button class="filter-tab${g===activeGroup?' active':''}" data-group="${g}">${g==='all'?ui.all:(ui.groups?.[g]||g)}</button>`).join('');tabs.querySelectorAll('.filter-tab').forEach(b=>b.addEventListener('click',()=>{activeGroup=b.dataset.group;render();}));renderArticles('');}
function renderArticles(query){const ui=UI[currentLang]||UI['de'];const q=query.toLowerCase().trim();const filtered=ARTICLES.filter(a=>{const d=a[currentLang]||a['de'];const mg=activeGroup==='all'||a.group===activeGroup;const mq=!q||d.title.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||a.tags.some(t=>t.toLowerCase().includes(q));return mg&&mq;});const grid=document.getElementById('article-grid');if(!filtered.length){grid.innerHTML=`<div class="no-results">${ui.no_results}</div>`;return;}grid.innerHTML=filtered.map(a=>{const d=a[currentLang]||a['de'];return`<a class="article-card" href="${a.file}?lang=${currentLang}"><div class="article-card-head"><div class="article-card-icon">${a.icon}</div><div class="article-card-cat">${ui.groups?.[a.group]||a.group}</div><div class="article-card-title">${d.title}</div></div><div class="article-card-body"><div class="article-card-desc">${d.desc}</div></div><div class="article-card-foot"><div class="article-card-tags">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><span class="article-card-arrow">${ui.read_more}</span></div></a>`;}).join('');}
document.getElementById('blog-search').addEventListener('input',function(){renderArticles(this.value);});
buildLangBar();render();
